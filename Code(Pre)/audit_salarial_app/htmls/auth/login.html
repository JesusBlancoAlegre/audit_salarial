{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-header text-center bg-primary text-white">
        <h4 class="mb-0">Iniciar Sesión</h4>
      </div>
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-bold">Correo Electrónico</label>
            <input name="email" type="email" class="form-control" placeholder="usuario@ejemplo.com" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Contraseña</label>
            <input name="password" type="password" class="form-control" placeholder="••••••••" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
          </div>
        </form>
      </div>
      <div class="card-footer text-center p-3" style="background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.05);">
        <small class="text-muted">¿No tienes cuenta? <a href="{{ url_for('auth.registrarse') }}" class="text-decoration-none fw-bold" style="color:#818cf8">Regístrate</a></small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
