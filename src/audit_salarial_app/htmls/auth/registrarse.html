{% extends "base.html" %}
{% block title %}Registro{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow-sm border-0 fade-in-up">
      <div class="card-header text-center bg-primary text-white">
        <h4 class="mb-0">Crear Cuenta de Cliente</h4>
      </div>
      <div class="card-body p-4">
        <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <h5 class="fw-bold mb-3 border-bottom pb-2" style="color:var(--primary-color)">Datos Personales</h5>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">Nombre</label>
              <input name="nombre" class="form-control" placeholder="Juan Perez" required autofocus>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Email</label>
              <input name="email" type="email" class="form-control" placeholder="usuario@ejemplo.com" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Contraseña</label>
            <input name="password" type="password" class="form-control" placeholder="••••••••" required>
          </div>

          <h5 class="fw-bold mb-3 border-bottom pb-2 mt-4" style="color:var(--primary-color)">Empresa (Opcional)</h5>
          <div class="row mb-4">
            <div class="col-md-8">
              <label class="form-label fw-bold">Nombre empresa</label>
              <input name="empresa_nombre" class="form-control" placeholder="Ej. Tech S.A.">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Nº trabajadores</label>
              <input name="num_trabajadores" type="number" min="0" value="0" class="form-control">
            </div>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">Completar Registro</button>
          </div>
        </form>
      </div>
      <div class="card-footer text-center p-3" style="background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.05);">
        <small class="text-muted">¿Ya tienes una cuenta? <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold" style="color:#818cf8">Inicia sesión</a></small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
