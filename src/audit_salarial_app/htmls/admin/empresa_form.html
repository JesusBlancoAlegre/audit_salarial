{% extends "base.html" %}
{% block title %}{% if empresa %}Editar Empresa{% else %}Nueva Empresa{% endif %}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">{% if empresa %}Editar Empresa: {{ empresa.nombre }}{% else %}Nueva Empresa{% endif %}</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="row mb-3">
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Nombre</label>
                            <input type="text" name="nombre" class="form-control" value="{{ empresa.nombre if empresa else '' }}" required autofocus>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">CIF</label>
                            <input type="text" name="cif" class="form-control" value="{{ empresa.cif if empresa else '' }}">
                        </div>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Num. Trabajadores</label>
                            <input type="number" name="num_trabajadores" class="form-control" value="{{ empresa.num_trabajadores if empresa else '0' }}">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Email de Contacto</label>
                            <input type="email" name="email_contacto" class="form-control" value="{{ empresa.email_contacto if empresa else '' }}">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin.lista_empresas') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-4">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
